<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>知识图谱职位推荐系统</title>
    <script src="/frontend/vendor/echarts.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #172033;
      }
      body {
        margin: 0;
      }
      header {
        background: linear-gradient(135deg, #2557d6, #26a69a);
        color: #fff;
        padding: 28px 8vw;
      }
      main {
        padding: 24px 8vw 48px;
      }
      h1,
      h2 {
        margin: 0 0 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 20px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgb(30 48 90 / 8%);
        padding: 20px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 14px 0 6px;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #dce3ef;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: #2557d6;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        margin-top: 16px;
        padding: 11px 14px;
      }
      button.secondary {
        background: #26a69a;
      }
      .job {
        border-bottom: 1px solid #eef2f7;
        padding: 14px 0;
      }
      .job:last-child {
        border-bottom: 0;
      }
      .title {
        font-size: 17px;
        font-weight: 800;
      }
      .meta {
        color: #5d6b82;
        line-height: 1.7;
      }
      .tag {
        display: inline-block;
        background: #eef4ff;
        border-radius: 999px;
        color: #2557d6;
        font-size: 12px;
        margin: 6px 6px 0 0;
        padding: 4px 8px;
      }
      .section-title {
        color: #4c5a70;
        font-size: 13px;
        font-weight: 700;
        margin-top: 10px;
      }
      .tiny {
        color: #6c7890;
        font-size: 13px;
        line-height: 1.6;
      }
      #graph {
        height: 520px;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>基于知识图谱的职位推荐系统</h1>
      <p>使用职位、公司、技能、城市、行业等实体关系完成岗位推荐与图谱展示。</p>
    </header>
    <main class="grid">
      <section class="card">
        <h2>用户画像推荐</h2>
        <label>技能（逗号分隔）</label>
        <input id="skills" value="Python, PyTorch, 机器学习" />
        <label>期望城市</label>
        <input id="city" value="上海" />
        <label>最低薪资 k/月</label>
        <input id="salary" value="10" />
        <label>偏好福利（逗号分隔）</label>
        <input id="benefits" value="带薪年假, 弹性工作" />
        <label>种子岗位 ID（用于多跳推理）</label>
        <input id="seedJobId" value="171714274" />
        <label>最大推理跳数</label>
        <input id="maxHops" value="3" />
        <button onclick="recommend()">生成推荐</button>
        <label>岗位 ID 图谱</label>
        <input id="jobId" value="171714274" />
        <button class="secondary" onclick="drawGraph()">查看岗位图谱</button>
        <button class="secondary" onclick="loadReasoning()">查看多跳推理</button>
      </section>
      <section class="card">
        <h2>推荐结果</h2>
        <div id="results">正在加载推荐结果...</div>
      </section>
      <section class="card" style="grid-column: 1 / -1">
        <h2>图谱洞察</h2>
        <div id="insights" class="tiny">正在加载图谱洞察...</div>
      </section>
      <section class="card" style="grid-column: 1 / -1">
        <h2>多跳图谱推理</h2>
        <div id="reasoning" class="tiny">正在加载多跳推理结果...</div>
      </section>
      <section class="card" style="grid-column: 1 / -1">
        <h2>岗位一跳知识图谱</h2>
        <div id="graph"></div>
      </section>
    </main>
    <script>
      const graphChart = echarts.init(document.getElementById("graph"));

      function splitInput(value) {
        return value
          .split(/[,，、]/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) {
          throw new Error(`请求失败 ${response.status}`);
        }
        return response.json();
      }

      function renderError(targetId, message) {
        document.getElementById(targetId).innerHTML = `
          <div class="meta">${message}</div>
          <div class="tiny">请确认 Neo4j 已启动、.env 连接配置正确，并已执行图谱导入。</div>
        `;
      }

      async function recommend() {
        try {
          const payload = {
            skills: splitInput(document.getElementById("skills").value),
            desired_city: document.getElementById("city").value.trim() || null,
            min_salary: Number(document.getElementById("salary").value || 0),
            preferred_benefits: splitInput(document.getElementById("benefits").value),
            seed_job_id: document.getElementById("seedJobId").value.trim() || null,
            max_hops: Number(document.getElementById("maxHops").value || 3),
            top_k: 8,
          };
          const data = await fetchJson("/recommend/profile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const html = data.items
            .map(
              (item) => `
                <article class="job">
                  <div class="title">${item.title}</div>
                  <div class="meta">${item.company_name} · ${item.city_name} · ${item.industry_name} · ${item.salary_min}-${item.salary_max}k · 得分 ${item.score}</div>
                  <div>${item.reasons.map((reason) => `<span class="tag">${reason}</span>`).join("")}</div>
                  <div class="section-title">评分拆解</div>
                  <div>${Object.entries(item.score_breakdown || {})
                    .filter(([, score]) => score > 0)
                    .map(([name, score]) => `<span class="tag">${name}: ${score}</span>`)
                    .join("")}</div>
                  <div class="section-title">推理路径</div>
                  <div>${(item.reasoning_paths || [])
                    .map((path) => `<div class="tiny">${path.hop_count} 跳 · ${path.score} · ${path.explanation}</div>`)
                    .join("")}</div>
                  <div>${item.skills.slice(0, 8).map((skill) => `<span class="tag">${skill}</span>`).join("")}</div>
                  <button class="secondary" onclick="setGraphJob('${item.job_id}')">查看该岗位图谱</button>
                </article>
              `
            )
            .join("");
          document.getElementById("results").innerHTML = html || "暂无匹配岗位";
        } catch (error) {
          renderError("results", `推荐结果加载失败：${error.message}`);
        }
      }

      async function loadInsights() {
        try {
          const data = await fetchJson("/graph/insights?limit=8");
          const sections = [
            ["热门技能", data.top_skills || []],
            ["热门城市", data.top_cities || []],
            ["热门行业", data.top_industries || []],
            ["热门福利", data.top_benefits || []],
          ];
          document.getElementById("insights").innerHTML = sections
            .map(
              ([title, items]) => `
                <div class="section-title">${title}</div>
                <div>${items
                  .map((item) => `<span class="tag">${item.name} (${item.count})</span>`)
                  .join("")}</div>
              `
            )
            .join("");
        } catch (error) {
          renderError("insights", `图谱洞察加载失败：${error.message}`);
        }
      }

      async function loadReasoning() {
        try {
          const jobId = document.getElementById("seedJobId").value.trim() || document.getElementById("jobId").value.trim();
          const maxHops = Number(document.getElementById("maxHops").value || 3);
          if (!jobId) return;
          const data = await fetchJson(`/jobs/${jobId}/reasoning?max_hops=${maxHops}&limit=10`);
          document.getElementById("reasoning").innerHTML =
            (data.paths || [])
              .map(
                (path) => `
                  <article class="job">
                    <div class="title">${path.target_title}</div>
                    <div class="meta">${path.hop_count} 跳 · 关联分 ${path.score}</div>
                    <div>${path.relations.map((relation) => `<span class="tag">${relation}</span>`).join("")}</div>
                    <div class="tiny">${path.explanation}</div>
                  </article>
                `
              )
              .join("") || "暂无多跳推理结果";
        } catch (error) {
          renderError("reasoning", `多跳推理加载失败：${error.message}`);
        }
      }

      function setGraphJob(jobId) {
        document.getElementById("jobId").value = jobId;
        document.getElementById("seedJobId").value = jobId;
        drawGraph();
        loadReasoning();
      }

      async function drawGraph() {
        try {
          const jobId = document.getElementById("jobId").value.trim();
          if (!jobId) return;
          const data = await fetchJson(`/jobs/${jobId}/graph`);
          const categories = [...new Set(data.nodes.map((node) => node.label))].map((name) => ({ name }));
          graphChart.setOption({
            tooltip: {},
            legend: [{ data: categories.map((item) => item.name) }],
            series: [
              {
                type: "graph",
                layout: "force",
                roam: true,
                label: { show: true },
                force: { repulsion: 180, edgeLength: 110 },
                categories,
                data: data.nodes.map((node) => ({
                  id: node.id,
                  name: node.name,
                  category: node.label,
                  value: node.label,
                  symbolSize: node.label === "Job" ? 58 : 42,
                })),
                links: data.edges.map((edge) => ({
                  source: edge.source,
                  target: edge.target,
                  label: { show: true, formatter: edge.relation },
                })),
              },
            ],
          });
        } catch (error) {
          graphChart.clear();
          graphChart.setOption({
            title: {
              text: `岗位图谱加载失败：${error.message}`,
              subtext: "请确认 Neo4j 已启动并完成图谱导入",
              left: "center",
              top: "middle",
            },
          });
        }
      }

      Promise.all([recommend(), drawGraph(), loadInsights(), loadReasoning()]);
      window.addEventListener("resize", () => graphChart.resize());
    </script>
  </body>
</html>
